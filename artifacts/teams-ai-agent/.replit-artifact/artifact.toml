kind = "web"
previewPath = "/"
title = "Teams AI Agent - Leave Management"
version = "1.0.0"
id = "artifacts/teams-ai-agent"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18618

[services.development]
run = "pnpm --filter @workspace/teams-ai-agent run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/teams-ai-agent", "run", "build" ]
publicDir = "artifacts/teams-ai-agent/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18618"
BASE_PATH = "/"
