server {
    listen 80;
    client_max_body_size 100M;
    root /usr/share/nginx/html;
    index index.html;

    # Serve the SPA — unknown paths fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Use Docker's internal DNS resolver to avoid stale IP caching
    resolver 127.0.0.11 valid=30s;

    # Proxy all /api/ calls to the api-server container
    location /api/ {
        set $upstream http://api-server:3001;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Increase timeouts for long-running AI requests
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }
}
