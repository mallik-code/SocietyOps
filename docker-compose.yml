name: societyops

version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# WhatsApp complaint Management System — Docker Compose
#
# Services:
#   evolution   Self-hosted WhatsApp gateway (Evolution API v2)
#   api         FastAPI complaint management backend
#
# Quick start:
#   1. cp .env.example .env  &&  edit .env
#   2. docker compose up --build
#   3. Open http://localhost:8080/docs → create instance → scan QR code
#   4. API is live at http://localhost:8000
#
# Useful commands:
#   docker compose logs -f api          follow API logs
#   docker compose logs -f evolution    follow Evolution API logs
#   docker compose down                 stop (keeps volumes)
#   docker compose down -v              stop + delete all data
# ─────────────────────────────────────────────────────────────────────────────

networks:
  complaint_net:
    name: complaint_net
    driver: bridge

volumes:
  sqlite_data:
    driver: local
  evolution_data:
    driver: local
  postgres_data:
    driver: local


services:

  # ── PostgreSQL — shared by Evolution API and api-server ──────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: complaint_postgres
    restart: unless-stopped
    networks:
      - complaint_net
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: ${EVOLUTION_DB_PASSWORD:-evolution_pass}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Evolution API — self-hosted WhatsApp gateway ──────────────────────────
  evolution:
    image: atendai/evolution-api:latest
    container_name: complaint_evolution
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - complaint_net
    volumes:
      - evolution_data:/evolution/instances
    environment:
      # ── Database (required by Evolution API v2) ───────────────────────────
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:${EVOLUTION_DB_PASSWORD:-evolution_pass}@postgres:5432/evolution?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: evolution_exchange
      # ── Server ────────────────────────────────────────────────────────────
      # PUBLIC URL where Evolution API is reachable from the outside world.
      # For local Docker use localhost:8080. Change for production.
      SERVER_URL: ${EVOLUTION_SERVER_URL:-http://localhost:8080}

      # ── Auth ──────────────────────────────────────────────────────────────
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-change-me-strong-key-123}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"

      # ── Global webhook → points to our FastAPI service ────────────────────
      # Inside the Docker network, the api service is reachable as http://api:8000
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: ${WEBHOOK_URL:-http://api-server:3001/api/webhooks/evolution}
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"

      # Only forward the events we care about
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_MESSAGES_UPDATE: "false"
      WEBHOOK_EVENTS_MESSAGES_DELETE: "false"
      WEBHOOK_EVENTS_SEND_MESSAGE: "false"
      WEBHOOK_EVENTS_CONTACTS_UPDATE: "false"
      WEBHOOK_EVENTS_PRESENCE_UPDATE: "false"
      WEBHOOK_EVENTS_CHATS_UPDATE: "false"
      WEBHOOK_EVENTS_CHATS_DELETE: "false"
      WEBHOOK_EVENTS_GROUPS_UPDATE: "false"
      WEBHOOK_EVENTS_GROUP_PARTICIPANTS_UPDATE: "false"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "true"
      WEBHOOK_EVENTS_CALL: "false"
      WEBHOOK_EVENTS_NEW_JWT_TOKEN: "false"

      # ── Session / device ──────────────────────────────────────────────────
      CONFIG_SESSION_PHONE_CLIENT: complaintBot
      CONFIG_SESSION_PHONE_NAME: Chrome

      # ── Storage ───────────────────────────────────────────────────────────
      STORE_MESSAGES: "true"
      STORE_MESSAGE_UP: "true"
      STORE_CONTACTS: "true"
      STORE_CHATS: "true"

      # ── Cache (disable Redis — use in-process local cache) ───────────────
      CACHE_REDIS_ENABLED: "false"
      CACHE_LOCAL_ENABLED: "true"

      # ── WhatsApp Web client version (override stale baked-in default) ─────
      CONFIG_SESSION_PHONE_VERSION: "2.3000.1035194821"

      # ── Logging ───────────────────────────────────────────────────────────
      LOG_LEVEL: INFO
      LOG_COLOR: "false"
      LOG_BAILEYS: info
      DEL_INSTANCE: "false"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s


  # ── Dashboard API server — Node.js / Express ─────────────────────────────
  api-server:
    build:
      context: .
      dockerfile: apps/api-server/Dockerfile
    container_name: complaint_api_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_SERVER_PORT:-3001}:3001"
    networks:
      - complaint_net
    environment:
      PORT: "3001"
      DATABASE_URL: postgresql://evolution:${EVOLUTION_DB_PASSWORD:-evolution_pass}@postgres:5432/complaint
      AI_INTEGRATIONS_OPENAI_BASE_URL: ${AI_INTEGRATIONS_OPENAI_BASE_URL:-https://api.openai.com/v1}
      AI_INTEGRATIONS_OPENAI_API_KEY: ${AI_INTEGRATIONS_OPENAI_API_KEY}
      EVOLUTION_API_URL: http://evolution:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-change-me-strong-key-123}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE:-complaint-bot}
    healthcheck:
      test: ["CMD", "node", "-e",
             "require('http').get('http://localhost:3001/api/healthz',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s


  # ── Dashboard — React SPA served by nginx ────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    container_name: complaint_dashboard
    restart: unless-stopped
    depends_on:
      api-server:
        condition: service_healthy
    ports:
      - "${DASHBOARD_PORT:-3000}:80"
    networks:
      - complaint_net


  # ── FastAPI backend ───────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: complaint-service/Dockerfile
    container_name: complaint_api
    restart: unless-stopped
    depends_on:
      evolution:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - complaint_net
    volumes:
      - sqlite_data:/app/data
    environment:
      DATABASE_URL: sqlite:////app/data/complaints.db
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SQL_ECHO: ${SQL_ECHO:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}

      # Evolution API connection (inside Docker network)
      EVOLUTION_API_URL: http://evolution:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-change-me-strong-key-123}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE:-complaint-bot}
      EVOLUTION_TIMEOUT: ${EVOLUTION_TIMEOUT:-10}

      # Policy engine
      READ_ONLY_MODE: ${READ_ONLY_MODE:-false}
      MIN_CONFIDENCE: ${MIN_CONFIDENCE:-0.7}
      ALLOW_CASUAL_REPLIES: ${ALLOW_CASUAL_REPLIES:-false}
      MAX_MESSAGE_LENGTH: ${MAX_MESSAGE_LENGTH:-2000}
      ALLOWED_GROUPS: ${ALLOWED_GROUPS:-*}
      ALLOWED_SENDERS: ${ALLOWED_SENDERS:-*}
      BLOCK_KEYWORDS: ${BLOCK_KEYWORDS:-}

      # GROQ AI classifier
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}

      # Knowledge Engine Integration
      KNOWLEDGE_SERVICE_URL: ${KNOWLEDGE_SERVICE_URL:-http://knowledge-service:8000}

      # Daily report scheduler
      REPORT_GROUP_ID: ${REPORT_GROUP_ID:-}
      REPORT_CRON_HOUR: ${REPORT_CRON_HOUR:-20}
      REPORT_CRON_MINUTE: ${REPORT_CRON_MINUTE:-0}
      REPORT_TIMEZONE: ${REPORT_TIMEZONE:-Asia/Karachi}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s


  # ── Knowledge Engine Service — Python/FastAPI ─────────────────────────────
  knowledge-service:
    build:
      context: .
      dockerfile: knowledge-service/Dockerfile
    container_name: complaint_knowledge
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - complaint_net
    environment:
      DATABASE_URL: ${KNOWLEDGE_DATABASE_URL:-postgresql+asyncpg://evolution:evolution_pass@postgres:5432/knowledge}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-gemini}
      # Single API key regardless of provider (Gemini key or OpenAI-compatible key)
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
      # Override these when switching providers; defaults match the EMBEDDING_PROVIDER default (gemini)
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-models/text-embedding-004}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SQL_ECHO: ${SQL_ECHO:-false}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
