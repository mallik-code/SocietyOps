openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Teams AI Agent - Leave Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: teams
    description: Teams message simulation and webhook
  - name: leave
    description: Leave management records
  - name: employees
    description: Employee and manager data
  - name: agent
    description: AI agent processing
  - name: settings
    description: LLM provider configuration

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /teams/simulate:
    post:
      operationId: simulateTeamsMessage
      tags: [teams]
      summary: Simulate a Teams message being sent to the agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamsMessageInput"
      responses:
        "200":
          description: Agent processing result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentResult"

  /teams/webhook:
    post:
      operationId: teamsWebhook
      tags: [teams]
      summary: Real Microsoft Teams webhook endpoint (for future integration)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamsWebhookPayload"
      responses:
        "200":
          description: Webhook acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /teams/message-log:
    get:
      operationId: listMessageLog
      tags: [teams]
      summary: Get all processed Teams messages
      responses:
        "200":
          description: List of processed messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProcessedMessage"

  /leave:
    get:
      operationId: listLeaveRecords
      tags: [leave]
      summary: List all leave records
      parameters:
        - name: employee_id
          in: query
          required: false
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of leave records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaveRecord"
    post:
      operationId: createLeaveRecord
      tags: [leave]
      summary: Manually create a leave record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaveRecordInput"
      responses:
        "201":
          description: Created leave record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveRecord"

  /leave/{id}:
    patch:
      operationId: updateLeaveRecord
      tags: [leave]
      summary: Update a leave record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaveRecordUpdate"
      responses:
        "200":
          description: Updated leave record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveRecord"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteLeaveRecord
      tags: [leave]
      summary: Delete a leave record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /leave/stats:
    get:
      operationId: getLeaveStats
      tags: [leave]
      summary: Get leave statistics summary
      responses:
        "200":
          description: Leave statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaveStats"

  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
      summary: List all employees with manager relationships
      responses:
        "200":
          description: List of employees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"

  /employees/{id}:
    get:
      operationId: getEmployee
      tags: [employees]
      summary: Get employee by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Employee details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /holidays:
    get:
      operationId: listHolidays
      tags: [employees]
      summary: List all holidays for the current year
      responses:
        "200":
          description: List of holidays
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Holiday"

  /settings/llm:
    get:
      operationId: getLlmSettings
      tags: [settings]
      summary: Get current LLM provider settings
      responses:
        "200":
          description: Current LLM settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmSettings"
    patch:
      operationId: updateLlmSettings
      tags: [settings]
      summary: Update LLM provider and model
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LlmSettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmSettings"

  /settings/llm/test:
    post:
      operationId: testLlmConnection
      tags: [settings]
      summary: Test the configured LLM connection
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmTestResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    TeamsMessageInput:
      type: object
      properties:
        message:
          type: string
          description: The message text
        sender_id:
          type: integer
          description: ID of the employee sending the message (simulating Teams user)
        channel:
          type: string
          description: Teams channel name
      required: [message, sender_id]

    TeamsWebhookPayload:
      type: object
      properties:
        type:
          type: string
        from:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
          required: [id, name]
        text:
          type: string
        channelData:
          type: object
      required: [type, from, text]

    AgentResult:
      type: object
      properties:
        id:
          type: integer
        message_text:
          type: string
        sender_id:
          type: integer
        sender_name:
          type: string
        channel:
          type: ["string", "null"]
        intent:
          type: string
          description: "leave_notification | not_leave_related | ambiguous"
        confidence:
          type: number
        agent_output:
          $ref: "#/components/schemas/AgentOutput"
        action_taken:
          type: string
          description: "leave_recorded | clarification_requested | ignored | holiday_conflict | unauthorized_poster"
        clarification_question:
          type: ["string", "null"]
        created_at:
          type: string
      required: [id, message_text, sender_id, sender_name, intent, confidence, agent_output, action_taken, created_at]

    AgentOutput:
      type: object
      properties:
        intent:
          type: string
        confidence:
          type: number
        employee:
          type: object
          properties:
            name_extracted:
              type: string
            resolved:
              type: boolean
            ambiguous:
              type: boolean
            candidates:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                  full_name:
                    type: string
                  department:
                    type: string
                required: [id, full_name, department]
            matched_employee:
              type: ["object", "null"]
              properties:
                id:
                  type: integer
                full_name:
                  type: string
                department:
                  type: string
              required: [id, full_name, department]
          required: [name_extracted, resolved, ambiguous, candidates]
        leave_date:
          type: ["string", "null"]
        leave_type:
          type: string
          description: "full_day | half_day | multiple_days"
        is_holiday:
          type: boolean
        poster:
          type: object
          properties:
            employee_id:
              type: integer
            name:
              type: string
            is_manager_of_employee:
              type: boolean
          required: [employee_id, name, is_manager_of_employee]
        action:
          type: string
        clarification_needed:
          type: boolean
        clarification_question:
          type: ["string", "null"]
      required: [intent, confidence, employee, leave_type, is_holiday, poster, action, clarification_needed]

    ProcessedMessage:
      type: object
      properties:
        id:
          type: integer
        message_text:
          type: string
        sender_id:
          type: integer
        sender_name:
          type: string
        channel:
          type: ["string", "null"]
        intent:
          type: string
        confidence:
          type: number
        action_taken:
          type: string
        clarification_question:
          type: ["string", "null"]
        agent_output:
          $ref: "#/components/schemas/AgentOutput"
        created_at:
          type: string
      required: [id, message_text, sender_id, sender_name, intent, confidence, action_taken, agent_output, created_at]

    LeaveRecord:
      type: object
      properties:
        id:
          type: integer
        employee_id:
          type: integer
        employee_name:
          type: string
        department:
          type: string
        leave_date:
          type: string
        leave_type:
          type: string
        status:
          type: string
          description: "approved | pending | rejected"
        approved_by_id:
          type: ["integer", "null"]
        approved_by_name:
          type: ["string", "null"]
        source_message:
          type: ["string", "null"]
        message_log_id:
          type: ["integer", "null"]
        created_at:
          type: string
      required: [id, employee_id, employee_name, department, leave_date, leave_type, status, created_at]

    LeaveRecordInput:
      type: object
      properties:
        employee_id:
          type: integer
        leave_date:
          type: string
        leave_type:
          type: string
        approved_by_id:
          type: ["integer", "null"]
        source_message:
          type: ["string", "null"]
      required: [employee_id, leave_date, leave_type]

    LeaveRecordUpdate:
      type: object
      properties:
        leave_date:
          type: string
        leave_type:
          type: string
        status:
          type: string

    LeaveStats:
      type: object
      properties:
        total_leaves_this_month:
          type: integer
        total_leaves_today:
          type: integer
        pending_approvals:
          type: integer
        messages_processed_today:
          type: integer
        top_departments:
          type: array
          items:
            type: object
            properties:
              department:
                type: string
              count:
                type: integer
            required: [department, count]
      required: [total_leaves_this_month, total_leaves_today, pending_approvals, messages_processed_today, top_departments]

    Employee:
      type: object
      properties:
        id:
          type: integer
        full_name:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        department:
          type: string
        role:
          type: string
        manager_id:
          type: ["integer", "null"]
        manager_name:
          type: ["string", "null"]
        teams_user_id:
          type: string
        email:
          type: string
      required: [id, full_name, first_name, last_name, department, role, teams_user_id, email]

    Holiday:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
        name:
          type: string
        type:
          type: string
          description: "public | optional"
      required: [id, date, name, type]

    LlmSettings:
      type: object
      properties:
        provider:
          type: string
          description: "openai | anthropic | groq | gemini"
        model:
          type: string
        api_key_set:
          type: boolean
      required: [provider, model, api_key_set]

    LlmSettingsUpdate:
      type: object
      properties:
        provider:
          type: string
        model:
          type: string
        api_key:
          type: ["string", "null"]

    LlmTestResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        provider:
          type: string
        model:
          type: string
        latency_ms:
          type: ["integer", "null"]
      required: [success, message, provider, model]
