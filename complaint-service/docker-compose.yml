version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# WhatsApp Complaint Management System — Docker Compose
#
# Services:
#   api         FastAPI complaint management backend
#   nginx       Reverse proxy / rate limiter (optional, comment out if unused)
#
# Usage:
#   docker compose up --build          # first run
#   docker compose up -d               # detached
#   docker compose logs -f api         # follow logs
#   docker compose down -v             # stop + remove volumes
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: complaint_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////app/data/complaints.db
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SQL_ECHO: ${SQL_ECHO:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}      # leave blank to use keyword classifier
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-3-haiku-20240307}
    volumes:
      - sqlite_data:/app/data               # persistent SQLite database
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Nginx reverse proxy (optional) ───────────────────────────────────────────
  # Uncomment to enable. Useful for production deployments to add rate limiting,
  # TLS termination, and access logs in front of the API.
  #
  # nginx:
  #   image: nginx:1.27-alpine
  #   container_name: complaint_nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     api:
  #       condition: service_healthy

volumes:
  sqlite_data:
    driver: local
